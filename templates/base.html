<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}课程评价站{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    .rating-stars { font-size: 1.5rem; cursor: pointer; }
    .rating-stars .star { color: #ddd; transition: color .15s; }
    .rating-stars .star.active, .rating-stars .star:hover { color: #ffc107; }
    .tag-btn { cursor: pointer; user-select: none; }
    .tag-btn.selected { background-color: #0d6efd !important; color: #fff !important; }
    /* 学分徽章 */
    .badge-cr { font-weight: 500; font-size: .72em; }
    .badge-cr-1 { background-color: #fd7e14; color: #fff; }
    .badge-cr-2 { background-color: #198754; color: #fff; }
    .badge-cr-3 { background-color: #0d6efd; color: #fff; }
    .badge-cr-other { background-color: #6c757d; color: #fff; }
    /* 培养方案胶囊（降低饱和度） */
    .badge-plan { background-color: #dce8f5; color: #4a6fa5; border-color: #b3cce8 !important; }
    /* 公共选修 */
    .open-panel.teacher-active { background:rgba(13,110,253,.15); border-radius:4px; outline:2px solid rgba(13,110,253,.4); }
    .ql-content p { margin: 0 0 0.2em; line-height: 1.2; }
    .ql-content .ql-indent-1 { padding-left: 1em; }
    .ql-content .ql-indent-2 { padding-left: 2em; }
    .ql-content .ql-indent-3 { padding-left: 3em; }
    .ql-content .ql-size-small { font-size: 0.75em; }
    .ql-content .ql-size-large { font-size: 1.5em; }
    .ql-content .ql-size-huge  { font-size: 2.5em; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-xxl">
      <a class="navbar-brand" href="{{ url_for('main.index') }}">课程评价站</a>
    </div>
  </nav>
  <div class="container-fluid px-4 py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  function linkify(el) {
    el.childNodes.forEach(n => {
      if (n.nodeType === 3 && /https?:\/\//.test(n.textContent)) {
        const s = document.createElement('span');
        s.innerHTML = n.textContent.replace(/https?:\/\/[^\s]+/g,
          u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
        n.replaceWith(...s.childNodes);
      } else if (n.nodeType === 1 && n.tagName !== 'A') linkify(n);
    });
  }
  document.querySelectorAll('.ql-content').forEach(linkify);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
